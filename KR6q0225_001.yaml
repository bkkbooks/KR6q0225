body:
  text: 學人振澄等記諸佛一大事因緣智不能知識莫能識如人飲水冷暖自知總欲説向人直無開口處古德應物垂慈乃有主賓言論正眼觀來終是空中鳥迹昔坐夏洞庭晝長無事取從上機語翻覆溫研輒有神會拈提頌述不敢自謾歲月浸久遂繁紙墨學者請付諸梓未有名也因憶雪竇顯和尚居翠峰日畣諸佛本源有雨滴嵒華之語取以名集曰嵒華集亦不忘原本之意也請政大方願垂教焉靈瑞住山符道者題示衆顧左右云今日與諸人同參一員真善知識卓拄杖云各各聽取教詔衆無語自代云敢為流通又云敢為流通須有一句到你山僧不曾説著個字已後有人問你作麼生舉代云一如和尚所教又云向下文長示衆是法非思量分別之所能解不得道半滿偏圓是甚麼法代云欲舉恐驚大衆又云還見壁麼或云達磨大師一覷九年全無佛法身心而今要見他何用代云也是又云已後不合恁麼問示衆拈起拂子云祖師鼻孔一串穿卻總捏在山僧手裏且教他甚處出氣代云和尚慈悲太煞又云費力有時云和尚慈悲太煞也是為他間事長無明如今休得也未代云布袋裏錐子又云三年同一春示衆春力不到處枯樹亦開花月色不來時虛室明如晝是則反嘗合道不是則守轍循途作麼生代云一堵墻百堵調又云有理總無雪處又云有理總無雪處冷暖秪可自知車不橫推一句作何判斷代云近日是何世界又云全不顧前後又云全不顧前後忽有人請和尚入火坑如何祗對代云能有幾個又云得示衆善財別後誰相訪樓閣門開竟日間即今法堂前草深多少代云洎埋沒汝又云不埋沒汝又作得個甚麼代云階下漢或云請師接上階還肯別垂方便否代云爭合小覷你又云門頭戶口底不要示衆日前道門頭戶口底不要則固是穩坐家堂因甚也抬腳不起代云無氣力又云喫粥喫飯了一切不為此人將來得何果報代云有一處安著又云填溝塞壑又云填溝塞壑也道橫身育物無處不到普賢毛孔境界還曾夢見也未代云上中下又云幾踏破草鞋示衆虛空裏書個卍字也不算塗污伊舜若多神因甚𨁝跳代云又添一畫又云只這一畫人人不知起處欲就伊借一問還得麼代云洎合不識勢示衆是法平等無有高下幡竿頭指天露柱腳踏地莫與實相相違背麼代云噫又云事不孤起有時云事不孤起鴟吻咬破佛殿脊著甚來繇代云胔或云雲門大師入露柱裏去也你道做甚勾當代云瞌睡又云醒也未示衆垂絲千尺意在深潭離鉤三寸蝦蟆也不曾遇個以拄杖作釣勢云還有衝浪錦鱗麼代云日勢稍晚又云來也來也示衆辨龍蛇眼陷虎凶機總是衲僧尋嘗用底出格一句作麼商量代云劄又云著甚來繇又云著甚來繇知你不肯分外分內底何不直截代云更事多矣又云何必或云何必不必相去多少代云俱又云念四示衆法身般若解脫三段不同為汝盡情拈卻了也有解問者出來代云尚未參堂又云事非草草或云事非草草一衆咸知審細德山逢僧便棒臨濟逢僧便喝兩個茆廣漢成得個甚麼道理代云洎不問過又云也有人説到這裏示衆山鬼把住麒麟兒海神捧出珊瑚枝他總不知尊貴為甚衲僧拈一莖草便作丈六金身用代云莫生下劣想又云不生下劣想寶几珍御將得來也未代云恐生驚異示衆望天不見天覷地不見地此人具眼麼代云更有一人何不問又云有一人不許安名著字我欲喚伊向前作何教詔代云直得遍地無行路又云既然遍地無行路爭得到這裏代云待你𨁝跳了與你注解示衆憍陳如不守本分騎佛殿出山門去也拈拄杖云若據本分合喫三十諸人還肯相救也無代云別更許某甲説道理麼又云和尚分取一半又云和尚分取一半山僧有過也不惜人撿責口是禍門且道在阿誰分上著代云不才謹退又代但吐舌示衆一舉不再説作麼生會代但掩耳而出又云撲碎驪龍明月珠敲出鳳皇五色髓古人費力不少就地拈一塊土拋向門外因甚又道粗心代云事不獲已又云也是又云禍不入慎家之門秪如淨名毗耶杜詞卻遭文殊讚歎空生嵒中晏坐又被天帝散花你道有回避處無回避處代云近日世界不好又云笑煞示衆盡乾坤是個解脫門把手拽不入底是英雄丈夫漢許他別行一路你即今通身在裏許還跳得出麼代云惱亂春風又云總不消也又云總不消也喫粥喫飯免得口麼代云計不出此又云鼻孔裏祗對我知汝用處解換機開口不在舌頭上一句因甚十個有五雙咽喉塞斷代云一日便頭白示衆撞著道伴交肩過參學事畢達者同歸一路行理無異致不涉是非句子甚麼人道得代云不惜眉毛者又云若不是我有時云若不是我拈拄杖云往往被這個帶纍代云幾合個中會又云不向個中會作麼生會代云始較些子又云歇得也示衆佛法遍在一切處菴內人為甚不知菴外事代云賺誤諸方又云合取口示衆今日也恁麼明日也恁麼苦哉佛陀忽然不恁麼救取一半不得教壞人家男女完全道一句來代云某甲惜口又云已後莫怪山僧示衆諸佛列祖你道還有不為人説底法麼代云某甲見不及此又云收示衆道人行處如火消冰腳跟下一坐具地甚處得來代云有人問著山僧不諱又云可憑可據又云可憑可據秪好閉門作活孤峰草裏跳得出許伊垂手塵勞代云行之即易言之轉難又云第一莫輕這上座示衆十方無壁落四面亦無門主人公從何出入代云不可別行一路又云洎合個中會又云不向個中會許有出身路不涉難易脫體道將來代云前是山門後是佛殿又云這漆桶示衆東家杓柄長西家杓柄短總莫管他間事且道門前溪水有多少深代云如汝所問又云和尚流也又云和尚流也喫粥飯了不妨我東行西行總是你守株待兔驢年夢見活祖師西來意代云和尚誠言又云話墮也示衆覓火和煙得擔泉帶月歸貧兒暴富一衆盡知隨分納些些底十八上作何活計代云教壞人家男女不是好事又云忘前失後又云忘前失後山僧一向有些適才未跨禪堂一句你還記得未代云西天令嚴又云不用低頭示衆昨日栽茄子今朝種冬瓜钁頭邊那一句作麼生道代云根生也又云與我提起看或云提起放下總不在別人手裏諸方儘有具眼衲僧因甚卒摸索不著代云寐語作麼又云曾問幾人示衆雲門餅趙州茶盡是人家喫過的殘渣剩滓未審客來將何祗待代云從來不分外又云某甲住山日淺或云釅茶三五盞意在钁頭邊你若不會憑個甚麼便敢住山代云彼此老大又云徒勞刻畫示衆一日打眠三五度也消不得許多間夢中忽有人索取飯錢如何對畣代云他後生天不得辜孤老僧又云苦屈之辭不妨難吐或云如今共你葛藤也已後不得辜負我有人問著作麼生與他諦當代云恰值某甲不在又云賊是小人示衆量材補職上古規繩無眼耳鼻舌身意的作何勾當代云別説道理向伊又云總繇和尚或云別説道理向伊總繇和尚忽若撞個繩墨上立工夫底還差得一線麼代云秪恐和尚不肯又云飽叢林示衆寒山燒火拾得搬柴雖然各逞伎倆折腳鐺子未曾分付著人有好使令的喚一個來代云事非草草又云辨卻多少人一日云長者長法身短者短法身不必勘辨汝從面前過我早識得也若見諸相非相作麼生辨代云築著磕著又云和尚離侍者早晚也示衆我要蓋一座空王殿未審作得個甚麼向當代云大有人不識勢又云計較未成或云世界與麼廣闊南北東西儘繇得你向這裏相度作麼代云魯般門下又云何啻今日示衆佛法秪在日用處舉心動念便不是了也門前石敢當你道還曾會麼代云洎與和尚作笑話又云全不顧前後又云全不顧前後底許他𡎺著磕著代云謾別入即得有時云東壁打西壁作麼相救代云薄處先穿又云著甚死急或云不可袖手旁觀如何是見義勇為底句代云你總不消行腳又云今日擒下一員草賊示衆大家團圞頭共説無生話俗氣也不除某甲有口挂在壁上用一手作的還搆得麼代云還容某甲説道理也無又云與露柱相去多少又云與露柱相去多少何不拈燈籠來照取代云猶隔一線在又云難分彼此一日云舉不顧即差誤擬思量何劫悟雲門大師道了也你猶向這裏眨眼作麼代云以己妨人又云苦哉佛陀示衆衲僧家從少至老踏遍無數山川如何是正行履處代云不曾錯一步又云總由得我或云總有撩天鼻孔亦被山僧穿卻上來下去還覺礙塞麼代云人無遠慮又云平地上不可更起骨堆示衆若為人輕賤是人先世罪業達磨大師為甚在你腳底代云謗斯經故又云阿誰罪過或云達磨大師在你腳底則且置帝釋與修羅在中庭裏相撲見麼代云三日後不得唱衣又云喫許多辛苦作麼或云得路便行底畢是誰家之子代云不得名又云東西南北示衆千般言萬般喻只要教君早回去秪如戶破家亡子歸何所代云當下便心息又云別人道不得又云別人道不得你試自道看代云我與上座有甚冤讎有時云來機即易再舉還難代云倒一説又云倒一説有甚利益代云石人眼赤又云提綱有路示衆過去心不可得現在心不可得未來心不可得二祖安底是那個心代云上座已後莫受人謾又云全提不起又云提不起底是心不是心代云細看前話又云此問何來或云目前坦然定要栽荊插棘作麼代云是伊不肯住又云合取狗口示衆眼見色耳聞聲鼻嗅香舌嘗味六根俱有用處秪如眉毛堪作甚麼代云從來疑著又云一切不如又云一切不如何不與伊拈向腦後代云未可容易又云動即禍生有時云去卻一拈得七是多少打算不來更有三十在代云和尚慣用此機又云衲子難謾示衆各各不相知各各不相借盞子撲落地碟子成七片如何會通代云對衆問將來又云實是古今罕聞或云陳蒲鞋周金剛赫赫底魔魅人家男女如今年代深遠不知向甚處去也有尋得伊腳蹤底與靈瑞通個消息代云舌是斬身之斧又云填溝塞壑示衆一大藏教是個注腳本文上親切一句還記得麼代云賺殺多少人又云爭好添一字一日云一切智智清淨貪嗔癡慢疑甚處得來代云更上一層樓又云正覓起處不得或云法者心光明是忽然打破漆桶或者也有一隙之明代云洎合錯會和尚意又云不得春風花不開示衆蝦蟆飛上梵天蚯蚓驀過東海奇特無過此也尋嘗一句對衆道看代云吾不如汝又云如此又云如此許你會忽若不如此又作麼商量代云青天白日又云兩重公案或云辨得親疏底人為甚麼卻被親疏不肯代云有甚屎臭氣又云抑已而已示衆口秪堪喫飯闔國咸知借鼻孔出氣因甚卻無人會代云年深月久又云上座見得甚親或云無神通菩薩因甚蹤迹難尋代云近來粗心轉盛又云伎倆已盡或云十方薄伽梵為甚麼秪有一路涅槃門代云十進九退又云甚處去來示衆禪之與道拈向一邊佛之與祖放過一著諸人分上合作麼生代云口秪堪喫飯又云爭敢埋沒伊或云人人具眼逢訪道人對即是不對即是代云收取額頭上汗又云取別人口又爭得有時云盡乾坤不出一剎那今時人向甚處辨明代云全靠山僧不得又云計較未成示衆陽春二三月萬物盡生芽未審道芽增長也無代云日頭出來看又云衆眼難謾或云同氣連枝為甚麼根莖有異代云惱亂春風或云無形本寂寥如何卻説有物先天地代云謝三娘不識一字又云露柱卻會示衆一花開五葉結果自然成當時是誰下手栽就代云退後者有功又云草裏漢又云草裏漢亂叫喚盡令提綱為甚麼不塞時人口代云往往如斯又云近日世界不好或云體本無瑕坐施良藥底大段勞而無功代云莫要茶喫麼又云救取一半示衆南頭買貴北頭賣賤平出一句作麼生道代云烏不前兔不後又云豈可分外或云汝不分外舊日草菴無一物如今卻有盈餘何緣致得代云幾個是知音又云別無伎倆一日云達者同遊一路行汝何不行代云某甲合伴不著又拈拄杖云這上座相隨來也如何是你途路中得力句代云和尚離侍者多少時也又云大路不行草裏走示衆從天降下底霜雪雨露從地涌出底稻麻竹葦中間是甚麼物代云不得向這裏問又云有甚麼諱處有時云明知生是不生之理為甚麼卻被生死之所流代云此意幽深又云更置一問來又云更置一問我也不辭你因甚鼻孔裏祗對我代云不是某甲幾被和尚惑亂又云莫塗污人好示衆是法住法位因甚左手書右字代云秪恐闍黎不問又云何得貴耳賤目又云貴耳賤目是你分中事迥超諸聖一機還曾撥得著也未代云好事不如無又云禍不入慎家之門又云禍不入慎家之門須菩提晏坐無言因甚至今埋沒在雨花堆裏代云堪笑堪悲又云成人者少示衆參學人一人所在亦須到半人所在亦須到因甚他人行處我不行代云放過一著又云今日遭人揀點或云語是誑默是謗語默向上有事在如何是語默向上事代云抱取貓兒來或云一點不來白雲萬里世尊因甚三七思惟代云不可為他斟酌也示衆開口則失閉口即喪舌頭一向為甚秪在口裏代云真實之言又云莫謾大衆或云真實之言我不謾汝一切諸法文彩已彰且道今朝風作何色代云久已無人問到這裏又云谷谷孤或云不得指東話西平實處道將一句來代云某甲自小不妄語又云有甚謾昧闍黎示衆佛法兩字加增之辭廉纖之説本文一段便請直捷代云提起看又云不可更添一字有時云祖師心印篆作何文代云更無別樣又云有甚碑記或云諸佛本源深之多少代云你且問到這裏一日云人搬柴柴搬人代云突出難辨又云幾成話柄示衆世法裏面迷卻多少人佛法裏面醉卻多少人秪如不迷不醉是甚麼人代云忘卻名字又云從來疑著一日云春至百花開秋來還落葉闍黎本生父母甲子多少代云莫向曆子上看或云陳爛曆日拈置一邊威音王已前是甚麼年號代云甲己之年丙作首或云若是金毛師子子三千里外見淆訛靈利衲僧為甚麼明前不明後代云從來疑著又云心不負人或云道人行處如火銷冰因甚𡎺著磕著代云近來粗心轉盛示衆假使百千劫所作業不忘因緣會遇時果報還自受因甚丹霞燒木佛卻教院主墮鬚眉代云舌是斬身之斧又云悔不慎當初又云汝道不可有兩個因甚大迦葉見世尊拈花便破顏微笑須菩提聞世尊説法即涕淚悲泣代云堪笑堪悲又云一狀領過或云一個鼻頭兩孔出氣這裏還分得優劣也無代云用盡自己心又云用盡自己心九九終歸八十一不落數量一句甚麼人道得代云如是如是又云某甲參堂去示衆父母所生眼悉見三千界且道須彌南畔是甚麼人居止代云莫謗山僧在這裏又云不可有兩個或云萬瓦清霜一窗紅日三世諸佛骨髓六代祖師眼睛總拋向上座面前了也個中有肯路無肯路代云直得寒毛卓豎又云轉近轉疏有時云生機一路千聖各不相借諸人腳下破草鞋何不乘時揚卻代云悔不慎當初又云商量看又云商量一任商量切不可粘牙綴齒代云本分衲子近來絶少又云確示衆明鏡當臺胡來胡現漢來漢現忽遇明鏡來時如何代云猶是光影邊事又云還見儂家麼或云一翳在眼空花亂墜靈瑞今日撒沙向諸人眼裏且道圖個甚麼代云做出便見又云自古自今又云自古自今秪有這個榜樣靈利道者點著便知天下老和尚喫許多辛苦作麼代云重處偏墜又云事不獲已又云事不獲已誠哉是言也且道黑豆裏掩得幾個祖師代云獨許闍黎又云洎與和尚答話示衆古人云有一句子百味具足鹹是鹹味淡是淡味不鹹不淡是嘗味秪這舌頭一點也謾他不得如何是百味具足底句代云匙挑不上又云到口方知又云到口方知拈起拄杖云這樣大底喫得多少代云某甲入衆日淺示衆路逢劍客須呈劍不是詩人不獻詩某甲自小元字腳也不曾識個奇言妙句總不消拈出吹毛劍略借一看代云退後退後又云今日造次有時云木人把板雲中拍石女含笙井底吹不落宮商是何曲調代云秋風吹不盡又云細而詳之示衆云為無為益無益即今休去便休去欲覓了時無了時拈拄杖畫一畫云盡大地一時冰消瓦解諸人別作得個甚麼代云倒退三千又云倒退三千雖是見幾而作若解踏步向前我也不惜兩手分付代云且信一半又云作家宗師示衆一不得問二不得休第三度來且在門外立皮下有血底那甘屈首塵中設不顧危亡排闥直入此人如何代云山僧打退鼓又云國有憲章或云依稀擔荷莽鹵承當若到諸方總也屈得指倒臨濟門下如何處分代云喫粥喫飯時少伊一碗不得又云闍黎眼光不放闊示衆迷之與悟總是兩頭語中間突出一句莫被當門齒礙麼代云成何道理又云遺笑諸方或云開口解笑底不妨賞伊大膽七棒對十三你但領取一半代云人心難滿又云人心難滿為甚喚你作佛便心生無限歡喜代云豈可自甘屈抑又云以己妨人示衆拈一放一這邊那邊如衣敗絮行荊棘林中要望脫灑自由吽吽且道具何三昧便得百花叢裏過一葉不沾身代云衣穿骨露又云明月照見夜行人有時云從上老古錐一味口甜心苦若向金不博金處勘得破是伊更敢開口也無代云腦後猶欠一椎又云胡餅裏討甚汁示衆臨濟正法眼滅向瞎驢邊乃拈起拂子云你道這一枝爭樣流傳得到今日代云幾人問到這裏又云餘人爭得聞或云餘人不聞一人合聞且道是那一人代云侍者點茶來又云長年不出戶一日云這裏還有祖師麼喚來一時生按過代云有甚麼限又云令不重行或云粉骨碎身未足酬一句了然超百億山僧一向劈腹剜心衆中還有知恩報恩者麼代云幸是某甲又云敢為流通
