body:
  text: 學人振渶等録春日懷古門外春將半桃花帶雨紅靈雲猶未瞥笑殺嶺頭風靈雲門外春將半修篁長嫩枝清風時擊著若個解忘知香巖門外春將半全心似死灰好花無剩影百鳥未曾來牛頭門外春將半懸絲釣淥波金鱗卒難遇明月自高歌船子門外春將半茶芽滿焙香近無人嗅著趙老謾顛狂趙州門外春將半幽林采藥行一莖全殺活妙德強惺惺文殊門外春將半漁舟別浦多數聲款乃裏淹殺備頭阤玄沙門外春將半孤峰草漸長善財無覓處煙水正茫茫善財門外春將半窗前野鹿行今朝不著便一箭付三平石鞏門外春將半黃鸝口更多觀音秪這是遊子意如何普門披雲臺頌和宋慈受深禪師原韻三間茆屋傍雲山雲自高飛山自間門外石頭行路滑無人得到翠微間枯木花開劫外春破顏得旨更何人翻然直入千峰去惆悵孤雲野鶴身蕭蕭竹色滿軒清月到方池分外明收拾耳門將眼聽忽然捉敗枕頭聲百鳥不來花自紅今年窮勝去年窮一從不食空王俸坐斷他家下載風今古英雄互戰攻電光石火不相容爭知物外金仙子萬象森羅一體中虛堂晏坐看峰頭萬派無聲水逆流斷臂安心太多事不如日用信緣休花香鳥語別峰前妙德空生何處邊解得虛空無相貌隨他器量自方圓吾欲休時無可休穿衣喫飯信悠悠好言謹白參玄客莫待他年怨白頭身作舟航據要津皮膚脫盡露全真多年滯貨無人顧杓水澆開面目新倒握烏藤膽氣粗此間無口説工夫都來一棒從分辨透得龍門豈是魚再和前韻一簣功成萬仞山面皮翻轉莫偷間英雄頭白只彈指幾個名高佛祖間肩橫楖栗愛穿雲踏破芒鞋不遇人堪笑空生貪晏坐雨花堆裏喪全身大鵬出海便飛騰下視塵寰雙眼明直取龍吞甚標格啾啾蟲鳥汝猶聲烈焰花飛雪片紅廓然無聖好能窮可憐闔國無人識揚子江心一葦風彼自無瘡勿用攻分皮分髓纍衰容那知三拜相傳印不在金襴一襲中薦取老僧百草頭明明賺殺好禪流天寒霜雪和根倒丈六金身笑未休坐臥遊行太古前蒼茫一望絶中邊問心求法無人到月在清波獨自圓緑樹成陰春已休晝長山舍事悠悠茶芽離焙忽穿鼻筍角帶泥爭出頭年來活計付兒孫淡泊身心慣率真一曲東山行水上雲門聲調越光新爪牙觸著莫嫌粗臨敵依違不丈夫及盡凡心無別解放生原是釣來魚蜜蜂頌和宋天封佛慈禪師原韻勘遍諸方得意時競將同調喚來歸無餘聲色呈君也花藥欄邊自在飛逢人便劄繞天涯苦屈無從一叩衙莫怪巡官偏杜撰針鋒要驗當行家工夫及盡蜜成時萬別千差永棄離金網縵縵猶是難漫云無事即寬脾同門出入各風光為衆忙如為己忙不立一塵家國盛從前勳業悔承當不貪寶惜戀枯桐個個臨機善變通堪笑眼中添翳者忙忙空裏覓花紅爆竹頌和靈嵒僧首師原韻怪得名喧宇宙中慣將一喝振玄風果知響逐聲來也不必窮年費苦工收放同時放較危要通一線驀頭錐奮然爆著虛空碎閃電光中霹靂追金圈拋出自音王儘有其人瞌睡忙誰是見煙須辨火色聲頭上立承當大小隨緣任去留正當轟烈得心休買來輸與他人放本色金錢肯浪酬嚇人嚇鬼有多方拍手呵呵笑一場勘破恁般關捩子裝聾作啞又何妨折梅供佛玉顏鐵骨老冰霜衆壑無人獨自芳折得寒香隨手至真堪供養法中王自贈住山歲月總不記但見四山青又黃博飯栽田爭如我説禪浩浩讓諸方間遊古寺古廟香爐冷不禁落花芳草伴啼鶯象王鼻孔無尋處迦葉低頭問世尊翠竹蒼松夾路生得間領鶴自經行夕陽西下水東去獨立不聞人語聲秋日舟中偶拈秋老芙容濯露鮮謝家人不在漁船間將新月垂秋水釣得金鱗即便還還山渡湖舞棹呈橈泛水雲鷺鷀飛入蓼花汀天然一色難分別孤負身心百不靈萬頃湖光接遠空片帆搖曳破秋風漁歌一曲無人會蘆葉紛紛對蓼紅亂雲堆裏數峰高曳履經行不憚勞記得去年當此際石床趺坐聽松濤歸山自嘲妙峰孤頂無行路到者全心當下灰堪笑白雲無定止被風吹去又吹來和劭監院師四偈嬴得楊岐第一籌更無間事著胸頭人間甲子都忘卻片葉落知天下秋嬴得楊岐第一籌妙峰孤頂日悠悠善財無處尋蹤迹煙水茫茫向外求嬴得楊岐第一籌門椎拍板賣風流宮商角徵非音韻萬象森羅盡點頭嬴得楊岐第一籌無端打入水牯牛斜陽芳草忘拘束始信渠儂得自由月夜間行門外峰巒列翠鬟昏鴉隊隊帶聲還微風吹落浮雲片月色如銀萬境間秋江如練浸長天萬籟無聲月正圓好景不須他處覓清光只在指頭邊靈光獨耀迥無鄰大地山河絶點塵若謂南泉超物外馬師賺殺幾多人夢中曾説悟圓通剔起雙眉月正濃長嘯一聲驚宇宙有誰同上最高峰芒鞋竹杖破蒼苔瀟灑胸襟向月開萬里無雲天一色好山如畫疊成堆小池小池秋冷碧涵空夜靜遊魚未見蹤死水不堪藏妙用波興一滴是真龍因雨示衆點點不落別處今古衲僧罔措大士慣用眼聽許伊有個入路雖然有個入路要且未有出身但莫循聲流轉何妨只用耳根雨滋庭草村鬧池蛙藉萬象以常談省山僧之為説苦雨連朝春草滋更添蛙鼓鬧平池人來不下禪床接免得渾身帶水泥秋風柳葉蕭條梧葉殘秋風一夜滿長安沒絃琴苦知音寡流水高山不用彈即景偶拈洞庭高卓壓群峰宇宙寥寥上下空風月一湖平似掌玉盤捧出碧芙容湖光湛湛月如銀一片心花露印文勘破威音聲色外任他飛躍自紛紜冬日舟行雪覆蘆花欲暮天一江風色正堪憐螭文萬派難區別重鼓蘭橈泛鐵船雪蓋覆乾坤同一色不知將底辨群機忽然枯木春風轉遍界瓊葩燦玉枝雪夜示衆吞卻山河不是塵太平時代自由身一華五葉香何極漫道庭無立雪人除夜小參歲盡年窮會也麼道人豐儉秪隨家北禪苦把耕牛宰奪角爭蹄亂若麻歲盡年窮會也麼團圞同喫趙州茶幾多臨渴重穿井伎倆雖高也大差歲盡年窮會也麼現成公案絶周遮當機若有仙阤客拈起靈山舊日花歲盡年窮會也麼身心歇處即歸家堪憐不猒馳求者途路之繞枉怨嗟歲朝示衆鐘聲披起鬱多羅借得婆衫卻拜婆賓主歷然同一室今朝昨日不爭多鐘聲披起鬱多羅沉水煙騰卍字爐三世如來同鼻孔等間一一盡穿過鐘聲披起鬱多羅貧到無錐意氣多佛祖位卑留不得聲光嬴得遍娑婆鐘聲披起鬱多羅也學諸方念佛阤莫把遙天支遁鶴等間喚作右軍鵝梅獨立冰霜外長愁風雨中素心曾不改秪合對蒼松探梅山前一片白雲橫七十峰頭次第登看到色空香不住故宜相對坐禪僧數點梅花冷結愁芒鞋踏遍小溪幽野人不辨香來處風起山中雪滿頭映水梅一枝冷艷占春先瘦影橫斜墮水邊桃李只誇顏色好清香難及藐姑仙庭前牡丹庭前花發牡丹紅指出分明似夢中一段色香誰辨取秪堪惆悵倚東風蘭風灑幽蘭日影長清心不語見慈祥知君獨抱馨香德空谷無人也自芳數珠偈信手拈來顆顆圓觀音彌勒聽敷宣驀朝掐斷繩頭也始覺從前一串穿誦法華經有感楊花摘得焰爐紅宇宙掀翻兩眼空放去白牛無影象且攜羊鹿慰兒童王夫人製彩絨牡丹甚精示以二偈金針玉線奪天工葉葉花花總不同識得根源歸自己全從掌握起春風春隨刀剪奪天工深緑叢中一點紅莫謂芳菲都不艷色香盡處是真空絨荷花示正平不染淤泥不帶空卻從指爪露真容法王何必輕拈出解笑方堪繼祖風頌古德語風作何色雨從何來不消彈指樓閣門開自有一雙窮相手未曾容易舞三臺雨從何來風作何色人定花香水落石出此時若不究根源真待當來問彌勒風起拈示禪者簸土揚塵山嶽搖不留蹤迹示全超大鵬養就圖南翼借爾須臾萬里遙排雲鼓浪正飛揚御世無心應萬方玉殿深深留不住松聲澗響共回翔示禪者拈出紅爐焰裏毛玄關燒盡樹高標等間跳上虛空背萬象平驚膽氣毫示月禪人赤手擒來潭底月清光落落照坤維世人有眼還同瞎須是深雲道者知示澄道者虛堂冷坐對杉松玉柱峰高翠滴濃有口秪堪長挂壁免教華雨墮寒空可仁道者住庵示之小小茆菴含法界善財何必向南參拈香擇火真三昧瞥爾情生便不堪慧安禪德請開示留贈偶來江上一停舟謝汝殷勤為款留莫怪山僧無指示見人問訊即低頭示亮道者茫茫三界原無法道者如何更覓心山徑寒風凋敗葉草鞋步步踏黃金示采禪人草鞋踏遍法身中不立孤危道絶功昨夜雲門提正令樹頭葉葉露金風秋月示雲林道人二偈拈出威音心裡月照開生佛未分前渠儂面目知何似籬落霜高菊正鮮歇得身心勿外求縱橫十字絶周由饒伊別有縵天網透過牢關也合休示蓮生大德心直無虛是道場面門瞋喜絶囊藏意根若使重遮護長劫迢迢滯異鄉贈喻中禪師胸襟磊落氣安間曾踏他家向上關萬象森羅齊喝彩清風嬴得遍塵寰山居雜偈白雲夜半正明青山天曉不露但秪間坐困眠管甚有過無過雲過松濤瀉碧雨餘柳帶垂青好景無人顧著飛來獨許幽禽水月頌山僧口裏無舌解道虛空是橛可憐伎死禪和秪管水中撈月示閨人參禪玉女夜拋梭織錦於西舍製就未生圖清光冷相射圓修道者有省示之心是根兮法是塵兩頭拈卻未為真忽然一捏百雜碎始信昔人非昔人勉無聞道者生來腳底無羈絆雲月溪山到處看今日鉢盂添個柄新鮮不似舊時安示智徹道人課佛念佛終期念自心莫將知見妄疏親但能淨穢雙忘卻敢保花臺決定生示照道者佛祖牢關一擊開百千三昧總嬴來逢人若肯呈牙爪敵勝驚群不可陪示隨侍諸子湖上島橫青玉案雲中塔鎖白銀幢威音一幅全生面不為群機有覆藏讀龐居士語録靈照人貧智短龐公年老心孤蕩盡家私無賴百草頭邊亂屙閲子韶無著機緣無著餈邊綴腳子韶蛙口翻身兩個一般病痛知他誰淺誰深山居即事松花香飯剛個飽荷葉碎衣勞再拴斗大茆庵傍溪住不知是馬是驢年春日筍蕨春肥香到齒竹梧晝靜冷侵衣長安冠蓋日相索爭及山家無是非別洞庭舊隱自攜瓢笠下雲岑彼此無言意甚深分付洞庭峰頂月清光留取照同心送禪者道人思欲南遊好將拄杖牢收出門莫貪快便蒼苔路滑如油無題三首不食空王俸塵塵得自由雖無三昧力一飽便知休會即恁麼來不會恁麼去金圈與栗蓬是甚間家具喝散一溪雲喚回千嶂月萬象各呈形誰能更饒舌
