body:
  text: 學人嶽嶙等録呈靈嵒老和尚德山放下繫驢橛臨濟除卻熱碗鳴兩個一雙無伎倆不知將底付兒孫酬張宮保大圓居士來偈附豐干老人慣饒舌師著語云有些子獨許寒山得一橛甚處得這消息來誰家玉女夜穿梭莫辨來蹤織就一花成五葉更事多矣截住臨濟熱碗鳴天下人無出氣分拗折德山繫驢橛費力不少婆子翻來勘趙州賺殺旁觀多少男兒齊叫屈古今扶不起和尚閲後偈道什麼侍者從旁笑曰居士忒殺倒卻剎竿枉喫許多粥飯便恁麼住將謂大圓止見錐頭利不見鑿頭方別有長處何妨拈出復下一轉語惜取口喫飯靈嵒將底付兒孫只恐跳不出依舊碗鳴還繫橛果然靈照休來勘阿爺苦屈之辭不妨難吐翠峰山前牛妳赤可知也靈照婆子童髦分少者由他少老者出他老臺山寒山烏兔判素非鴨類三個拈來一串穿阿誰下手且道女身轉不轉居士用心良苦末後句留與阿師自道三十年後有人舉在阿難倒卻剎竿迦葉扶持不起靈嵒方便為人分付大圓居士閉口已露鋒鋩開口何勞再勘只為多個襆頭長老翻成俗漢尚書離文字求庵主非男女相請問行腳高流且道恁的模樣老師猶少機關侍者那知端的分明舉似諸方要驗不欺之力羞見總持得肉恥同懷讓分眉直得一塵不染方名真正男兒你道是神是鬼渠言非聖非凡居士智過鶖子許伊勘得寒山述志佛祖之道淵且微淺深悟入隨群機後人碌碌昧此意持刀追逐爭傳衣阿誰能達禪河底蠡測管窺欺爾汝縱然奪得舊袈裟心印雕鐫不相似莫怪今朝太穿鑿當初已見源頭濁瞿曇偶爾自拈花迦葉無端便輕薄東土西天兩脫空敲骨取髓情難容慣傷物義絶回互驅雷策電難尋蹤山僧秪個莫妄想要與古今呈榜樣善財童子向南參歷盡門庭無背向百千三昧空納空了無隻字填心胸渾如金翅劈溟渤恣情快口皆神龍塵說剎說熾然說何必豐干重饒舌把茆自立好生涯鐵鑄飯鐺一腳折寄李老夫人祖師西來喚牛作馬上大人前可知禮也一大藏教秪說這個但形文彩即屬染污全佛即心全心即佛兩既一般刀不自割雪峰輥毬禾山打鼓喪盡家私超佛越祖不屬艱難亦非容易塞卻鼻孔甚處出氣鳧脛自短鶴頸自長併卻唇吻許汝商量長天秋水孤鶩落霞趙州不會且坐喫茶露濯花鮮風搖葉落本自天然何煩雕琢離念境界本無得失才擬分疏家親是賊文字性離非無文字逢著知音分明舉似巨宗道者有省偈贈道人家有底說日用中活潑潑飯充飢茶止渴本現成無祕訣閃電機霹靂舌擬弄巧翻成拙戲拈筆閒不徹太虛空齊點抹字非文眼當活驀相逢施一喝漆桶子連底脫出常情探虎穴握權衡看縱奪識得伊超祖佛寶持兄開法南詢寄之運水搬柴事偶諧隨家豐儉絶安排鉢盂添柄新翻樣直得虛空笑滿腮門庭建立太無端慚愧頭阤倒剎竿互換機輪看仔細作家今日笑阿難示靈捷道者一壑松風庵小小七十二峰青未了畏寒懶剃髮髼鬆溪深杓柄長多少示自賢道者欲知諸佛出身處看取東山水上行一夜虛空開口笑好將肝膽為人傾寄董庵主人岸草隨溪緑村花映日紅不須頻對面千里自同風示迅機道者迢迢歷劫秪如今須信凡心即佛心莫鎖自家無盡藏苦拈黃葉當真金示堅如道者清風匝地骨毛寒莫把瞿曇作佛看處處緑楊堪繫馬家家有路透長安示明原道人二偈祖師來自普通年良馬何曾離得鞭但盡凡情無別解飢餐渴飲且隨緣踏倒雄峰向上機去來語默絶思惟大千捏聚無多子積嶽堆山在一微墮鏡撲碎古菱花風流出當家若言曾得悟美玉又添瑕寄自可道人荷擔此道貴英靈列聖叢中作典型意氣不從他處得華山一劈破層青寄淨雲道者垂手機先六不收電光影裡豁雙眸塵塵拈出金剛印文彩縱橫接上流靈峙和尚五十壽頌麒麟不為祥鳳凰不為瑞靈山師子王天然具尊貴一聲哮吼遠近聞狐兔潛蹤頭腦碎爪牙用出更驚群殺活全提無向背堂前翠蔭十分圓吹徹香風今遍界同條生也共敷榮百萬人天永依賴月夜偶示指破青天月何人著眼看翻疑月是指今古黑漫漫閲參同契執事原是迷契理亦非悟咄哉老石頭開口便話墮悼伏獅義恭禪師舊與師同參家山揖別向南詢負笈擔簦秪兩人君就獅林稱導首我從鴛水獲閒身雲泥異勢將誰怨冰雪盈懷各自珍今日素帷陳茗奠白頭雙淚更傷神栽松道者短钁鉏煙冷長鍬帶雨寒青松當路種不礙往來看山中書壁有個青松樹都來不記時昂霄長獨立那怕雪霜欺壽勝力居士花甲黃金三百六顛倒循環無斷續拈出威音古月輪照見未生前面目眼耳鼻舌強安排智慧德相同具足描不成兮畫不成多福門前一叢竹病起贈朗仲居士士善岐黃莖草拈來殺活全溫辛甘苦各從權君家善用知通變藥病相投遂霍然衆生病已入膏肓大士重投對治方不學維摩能忌口如何肺腑得清涼贈趙封初居士悅道翻身騎霹靂雷門布鼓盡銷聲一琴一鶴風規別雖在人間出世情讀書自足忘名利賣藥方能識苦甘泡影百年知是幻花開葉落也須參塵中不染古君子林下自高閒道人倦即投床飢便食從來雕僞不如真龐公未了婚姻事陶令偏多兒女纏獨有南村趙居士比他二老更超然披雲和尚養母偈平地掀翻生死津草鞋如虎更精神諸方飽勘慵抬眼擔荷懸絲在爾身啐啄同時子母全大機之用更超然隨人腳轉陳尊宿織履何如自種田賣心斷臂有真規熱血寒鋩苦為誰今日更無人重法纍他古佛墮鬚眉靈山諸弟競成名說法神通各自撐誰識天花零亂處嵒中宴坐有空生散宅破家如趙老些些隨納勝南泉再來有願支臨濟出便為人然不然念佛偈示徒鷲嶺一枝花世尊為拈掇迦葉曾破顏祖祖傳心訣苟非大力人往往成途轍佛滅二千年根器日衰拙五百與三百龍蛇常混雜人我恣貪瞋個事無交涉入室反操戈結黨爭衣鉢釋迦好弟子皮下皆有血宜速改門庭同念西方佛一卷彌阤經金口親宣說令諸念佛人三界橫超越晝夜常惺惺不共塵勞合念念即自心心心非別物念與念俱亡淨穢應時脫覿體是彌阤何煩更饒舌我記如是人直下齊了徹衆苦不能侵逍遙長快活偶示松風自奏無絃曲水月長懸不夜燈眼裡耳裏絶瀟灑天上人間只一僧頌石頭語太平日月無形像不在乾坤有鳳麟但得皇風成一片碌磚拋出也光生荷花風掠晴荷水閣涼淤泥不染夜生香全身如坐車輪大不必西行覲法王休夏東山白雲影裏種空花捩轉風頭景色賒堪笑閒身無著處卻來煙島臥寒沙貧富富貴猶嫌千口貧窮轉恨一身畫鼓當軒試擊驚翻舜若多神山房桂花盛開秋風一夜到山房金粟花開月滿廊鼻孔撩天亦穿卻不知誰個解聞香拾墜松山險無行路誰人到此中夜來風色緊拗折數株松十二時歌夜半子夢裏紛紛不知止踏破東山西嶺青翻身原在被窩裏雞鳴丑日用頭頭自諧偶那邊水洗面皮光這裡啜茶濕卻口平旦寅萬象之中獨露身佛祖到來難著力惟人自肯乃方親日出卯珊瑚樹林色杲杲不須別處覓瞿曇丈六金身一莖草食時辰別甑炊香玉粒新喫粥了洗鉢盂去便道宗師指示人禺中巳莫向太虛分彼此風中鈴鐸善宣揚歷歷分明無一字日南午愛閒不打禾山鼓無事上山走一遭倦來又上蒲團坐日昳未十二部經可知禮稽首南無上大人試問何為丘乙己晡時申會得依然猶隔津自怪修行不得力順成歡喜逆成瞋日入酉一彎月掛窗前柳吹火柴生滿灶煙頭上青灰三五斗黃昏戌老鼠便來偷白蜜床頭打絮到三更連纍山僧不得息人定亥芥子吸乾香水海衣內摩尼忽放光露柱燈籠齊喝采行路難臨江仙貴賤形骸隨業轉世人顛倒堪悲初生便有死追隨才分你我相骨肉已參差未入娘胎何處也好教猛省深思剎那不住苦凄其炎炎三界內跳出是男兒生苦記得少年多意氣轉頭萬事皆空雞皮鶴髮漸成翁眼昏常帶霧齒漏不關風老健春寒秋後熱謾誇心尚孩童急須學佛悟真宗遷延如有待日暮怨途窮老苦石火電光能幾幾終朝美酒肥羊莫言災退遇良方兒孫雖得力痛苦自支當病後始知身是纍健時多為人忙爭名奪利走風霜生平無片善前路黑茫茫病苦百年信是無根蒂心驚陌上飛塵全憑一氣作天鈞不知渾似夢卻認夢為真呼吸不來長逝矣休論我富他貧田園妻子與家珍萬般將莫去惟有業隨身死苦寄照道人一朝夢醒豁雙眸塵網重重不敢留絶勝轉龍成佛女更無寶惜掛胸頭自列孤明照獨存心燈焰續廓重昏他年振祖風規別不負今朝在法門寄間道人為師為法莫辭勞同道相將立志高養就垂天雲樣翮培風一舉上雲霄成就他人即自成好看大士利生情法門覺樹䨥榮日天下同稱好弟兄遣懷塵蹤長揖臥煙蘿卻笑諸方露布多心井既乾無識浪任他平地起風波送子觀音墨塵點剎遍分身萬種花開一樣春識得觀音真實相掌中拋下玉麒麟病中作眼前身是夢中身電影燈光起滅頻誰向千年桃核裏重新來覓舊時仁山居一舍三楹翠岫圍離離橘柚晚香飛石床昨夜生秋夢似向松門跨虎歸有感禪到今朝不耐看神頭鬼面幾何般憑君轉日回瀾手扶起靈山舊剎竿蜂起禪門日已非魔風滾滾盡緇衣不如插腳蓮華會一任諸方笑鈍機傷穎正剛剛教得可憐生拋卻皮囊別路行喚不轉頭徒悵望窗前留下讀殘經示勝禪者要為佛祖好兒孫須是知恩解報恩生鐵心肝無改變常施法雨潤三根示雲禪菩提心是佛根芽法雨滋培力轉加不逐境風凋落盡香飄果熟記無差落花朝來風捲昨開花零落紅香起怨嗟艷色寧知不常好卻從魂夢立生涯示原道人芳草叢邊指路頭教伊驀直漫凝眸憧憧湖海知音寡匝地清風付趙州商量石鉛山有石並立其狀如人偶語故云壁立峰前老白雲此無言說彼無聞如何卻受商量號脫體孤危錯過君儼然二老共談心流水高山是賞音不落人間凡異調自能越古更超今全無竅穴卻玲瓏不費神丁斧鑿工偶爾間名掛群口豈因呵佛占孤峰曾無一字到人憎笑殺春風長葛藤天下舌頭都截斷教伊解語是山僧個個因君眼倍青一雙無口解談經是渠向上人難會惟有虛空側耳聽無心撞著轉身難磊落相依表歲寒須信欲言言莫及話頭不舉自團圞幾度逢春不變心順憑花笑與鶯吟全無滲漏超三墮嶺上木人休自矜不逐閒雲老泛浮肯同枯木倚寒丘無情有性人難信只合渠儂自點頭才涉商量便不堪未言先喻石頭諳雖無一字衆山響何必嘮叨強指南天荒地老兩相成謾道能言不解行舉世知音隨舌轉幾人曾聽到無聲
