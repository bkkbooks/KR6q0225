body:
  text: 靈瑞禪師嵒花集敘臨濟之道迥出嘗情諸佛玅理非關文字若但向筆峰墨海間浮沉上下豈止湮沒法身即名身句身亦胥淪喪首稜嚴經中佛語阿難汝等若以緣心聽法此法亦緣如來無礙境界若用有思惟心領攬如人以手撮摩虛空秪益疲勞終無得也況我祖師門下言如雷火搓之而一點隨游事比蟾輝唱之而孤輪不墜直須以心中眼觀身外相觀之又觀乃辨真偽徒以名位楷模形言區別豈真具擇法眼善知知識者哉讀靈瑞大師語足可隳情城裂見網龍種飛騰原出牝牡驪黃之外若執常經以相皮毛是知駑駘而不識騏驥未可與語鞭風策電之機也師少警敏具大根性得記靈嵒開法玅湛其上堂錄已板行于世茲集蓋居靈瑞日與從上諸老眉毛廝結激揚酬對代別徵拈彙聚成編命名嵒華取雪竇顯和尚畣諸佛本源語也眾生迷其源法身流轉五道若病眼之見空花諸佛窮其源惑業皆成智光同淨水之含寶月達磨骨髓神光臂血打下曹溪混成滴水至滹沱其源益濬其流益長嚙雲噬空滔天沃日譬諸百川至海臻極孰能窺其涯涘曷可辨其端倪除是金翅鳥王力量擘開洪浪直取龍吞餘皆望洋難與語大若僅缽盂鐼子盛貯少許充然止足謂我得也得也自是器量有限又爭怪得不聞古人有言汝若一悟便了只將自己所見亞在胸臆動即傷鋒犯手出世為人不得且道病在於何只為大法未明從上綱宗未透雖有衲僧巴鼻未具金剛眼睛安能辨驗龍蛇決擇倒正我靈瑞大師口門濤涌舌底瀾翻有時將全海攝入一滴盡乾坤乾爆爆棒打石人秪貴實論有時將一滴散成全海亙古今屙漉漉不圖入水要見長人果然出海自高請看甚生標格因他家曾向一手指天一手指地識得源頭起處所以把住放行不離掌握今人未達其源只管隨波逐浪那知總持一見不再見猶在擊石火閃電光裏立生涯末山路口接灌谿也是山門外荒草堆頭行活計無著油餈邊啖咂至今綴齒粘牙智通浴室裏商量反覺添塵益垢爭如此老一切不為應用臨時得大自在磨礱理窟搜抉玄根樹尼部之紀綱剔禪宗之骨髓如爇牛頭之香如探驪頷之寶如食甘露之味如采靈瑞之華真可謂出格全提窮源玅指且道憑個甚麼到此地位大圓舌頭不在口裏聊借古人一片與你說破滔滔心地中流出低處低平高處高坎止流行皆未是終歸大海作波濤歲在重光赤奮涂月佛成道日大圓居士張有譽書於靈嵒之無垢室
