body:
  text: 侍者振清等録靈嵒退翁和尚住祥符日垂問學者五宗門風頌語臨濟宗問目前無闍黎那個是賓白雲一片隔層巒分付來人仔細看腳下不知行路險漫資捷徑出長安問此間無老僧那個是主本無諱處見還難誰並當軒立問端古鏡一朝重撲破轉身休覓夜光寒問唯此一事實餘二則非真何者是權皓魄當空照絶私休將病眼更窺池若從指節量分寸辜負靈山李老師問但以假名字引導於衆生何者是實閒將蜜果換葫蘆暮四朝三慰衆狙解下灰囊原是飯從前心想一時枯問不許夜行剛把火以何為照月落潭空鑒者稀略通一線為輸機誰能返顧來時路馬載驢駝盡入微問直須當道與人看以何為用展手風前出衆岐如山如嶽絶毫釐直饒翻轉娘生面未是他家烜赫兒雲門宗問既曰函蓋乾坤因甚菴內人不知菴外事堯天舜日樂雍熙身在其中總不知鑿井耕田事成辦未聞野老解攢眉問既曰目機銖兩因甚放過一著落在第二不犯鋒鋩正令行從來善敵厭談兵無中有路超終始火聚刀山也出情問既曰不涉萬緣因甚從苗辨地因語識人機善漚和解截流辨人端在一毫頭祖師骨髓難收拾撒出青青百草頭溈仰宗問父慈子孝因甚不上令下從反用劍刃上事隨順還貽禍滅門劍鋒有路合酬恩干戈玉帛齊拋卻木枕斜推誑下根問見角知牛因甚脅下添得五字五年分疏不下蹄角撐空復印泥暗藏聲價少人知是渠鼻孔難牽挽肉眼從旁只相皮問見煙知火因甚夜深撥得些子至今燈焰不續寒爐深撥焰花紅燎盡雙眉卷卻蹤鐵額銅頭難湊泊誰能打鳳更羅龍曹洞宗問莫行心處路因甚猶有一人從正中來心徑苔生舉步慵肯因閒寂滯高蹤蒼龍不向澄潭臥飛劈青霄雷雨從問不掛本來衣因甚娘生褲至今脫不下赤體堂堂不掛絲己靈偏重太平癡直須更淬莫邪利削盡娘生舊面皮問何須正恁麼因甚道直須恁麼始契如如應物呈形井覷驢私緣蕩盡我如渠休貪勛業標麟閣名字宜從左脅書問切忌未生時因甚雲嵒洞山向不生不滅處相見楚天藏盡月輪孤漢地星垂列壯圖誰向春風怨楊柳從來客路是歸途法眼宗問三界唯心因甚要言前定旨不種梧桐免鳳棲機先鵬翥力難齊茫茫匝地無餘土一色平沉始半提問萬法唯識何必向句裏明宗春草叢邊脫兔遙守株空歎鬢絲焦憑君略展張麟手八萬四千非鳳毛問一切現成你道撥萬象不撥萬象嶺雲淡濘澗奔忙屋角花枝自短長飯飽山僧閒弄箸苦無佛法得商量靈嵒上堂云佛法不是小事夫說法者須是六種成就第一安立成就師注真妄同源形名未垂第二目前成就師注塵塵有路不滯偏方第三自己成就師注蕩盡諸緣照體獨立第四智智成就師注卷舒絶待照用齊行第五本末成就師注正位方彰大功無問第六平等成就師注混然忘跡凡聖迥超六種圓具法法歸宗一種有虧言言昧旨上根利智自然一六互收淺學初機切忌循途守轍卓拄杖師注自古自今可憑可據下座靈嵒上堂云夫臨機轉握共有八門定亂致平難拘一法或奇正之縱橫或陰陽之紛錯九天九地一死一生擒賊擒王射人射馬所以決勝要在臨時神符貴於轉換門門有路步步通塗過量英雄不煩指點自能排身直入其或不然靈嵒為汝打開八門拈起拄杖云第一剎那該攝門師注逼塞虛空古今無間第二主賓成立門師注同風敲唱識者還稀第三當機生法門師注妙應臨時全忘啐啄第四豫奪自在門師注縱擒錯互不落尋嘗第五輸機善用門師注換象抽爻突出難辨第六全提正令門師注鋒輪並運殺活齊施第七諸根普攝門師注殊道同歸不資餘力第八太平無象門師注化機絶朕尊貴無方卓拄杖云這是那一門衆网措遂下座旋風打散歸方丈師注從前汗馬無人識秖要重論蓋代功藏雲室十二種日旋三昧師注并敘金圈拋出三藏絶詮玉誥頒來十方洞鑒不行意路言如雷火當天打破情關道比蟾光出海願諸達士共契斯宗玄符謹志生佛未形如何通信師云塞卻鼻孔條然素潔試請安名師云拄卻舌頭心識不到別有生機師云突出難辨迥脫根塵方堪讚歎師云豈涉繁詞旁通一線許汝商量師云知音者誰乍卷乍舒開遮自在師云動還翳目萬仞壁立湊泊還難師云個中無路有二岐路不可不知師云孰辨奴郎應物隨機熾然無間師云此意須明和合諸塵不入衆數師云幾成獨立披毛戴角佛眼難窺師云不妨奇特十字縱橫一真不立師云可知禮也佛祖真讚釋迦文佛讚未離兜率降皇宮未出母胎度人畢真實之言可上碑淺慧凡沈信不及獨許韶陽得一橛知他皮下原無血刻畫深求面目全分明弄巧翻成拙無量壽佛讚無字真經秖有一句近在口邊可憑可據飯後堂前閒行兩轉阿彌陀佛去此不遠華池寶網水月山雲纖塵不立親見法身文殊大士讚我真文殊無是文殊若有是者則二文殊要識文殊秪這便是但恁麼去金毛師子普賢大士讚心聞洞十方生于大因力靜中起一念當處是遍吉六牙白象縱全威等間踏破精靈窟彌勒大士讚天上無彌勒高高處觀之不足地下無彌勒低低處平之有餘紅塵鬧市裏車闐馬隘青山白雲裏竹密松疏要見彌勒大士出門處處逢渠觀音大士讚菩薩衆生母衆生菩薩兒從來劈不破起倒鎮相隨苦厄憑依仗慈悲普護持請觀垂手處甘露滴楊枝十二面觀音像讚拶破面門行活路僧繇妙筆終難措蓮華國土久拋離欲歸忘卻來時路寶陀嵒大士讚大士不坐寶陀嵒癡人空向濤聲拜但得居塵不染塵是即名為觀自在絨繡觀音讚謾道素縑描未就隨緣赴感見深慈一針鋒上全身露脫體風流不掛絲魚籃觀音讚護生全用殺生心透網金鱗掌上擎一遇知音便分付肯同死貨定行情送子觀音讚菩薩無緣具大慈偏能嚼飯餵嬰兒青青一片波心月只許嵒前鸚鵡知觀音文殊普賢三大士同軸讚從聞思修具悲智願品字莊嚴毫端涌現雖然有卷有舒要且無背無面見不見倒騎牛兮入佛殿普門大士讚二首鐘作鐘鳴鼓作鼓響大士悟門清機歷掌一雙紫燕語簾前兩個黃鶯啼柳上會得聲前旨圓通路坦平頭頭瞻妙相彩墨畫難成布袋和尚十字街頭等個人分明擔閣殺閒身打開布袋不知惜傾盡夜光明月新達磨面壁像這漢通身莽鹵不信口能招禍致令後代兒孫鬼窟長年打坐折蘆渡江像得饒人處且饒人莫笑梁皇手段輕這漢自知無禮節不煩趕逐便抽身初祖赤腳渡流沙東來路便差一身華擘盡何啻落門牙二祖夜雪寒凝骨朝霞血染空得師一臂力萬古振玄宗三祖換卻舊皮毛通身越樣驕大書信心銘憎愛一時消四祖從本無人縛何更求解脫直下自知歸擺手行空闊五祖碌碌種新松忙忙翻舊面若欲問生緣今朝不著便六祖腳未踏黃梅街頭行短販識得負薪人卸下千斤擔南嶽何物恁麼來金雞一粒粟取捨兩俱忘牛車轉轆轆馬祖即心即佛難非佛非心易踏殺天下人腳跟不著地百丈扭得鼻頭歪無端入禍胎面門分哭笑布鼓當春雷黃檗吐舌全機用橫身弄爪牙寰中曾獨步言下定龍蛇臨濟賺無位真人滅正法眼藏罪犯不容誅且喫三頓棒興化滿握撒真珠無人識得渠全提木拐子行說任偏頗南院作家不啐啄一棒絶商量直下滅胡種哀聲滿大唐風穴慣用鐵牛機高提祖師印不得小釋迦誰續懸絲命首山放下法華經拈起竹篦子到老只隨流楚王城畔水汾陽氣宇大如王肝腸狠如賊破滅臨濟宗衆不滿三十慈明弄西河師子擒臨濟大龍干戈齊偃息談笑起真宗楊岐栗蓬作麼吞金圈如何透放出三腳驢作大師子吼白雲天下好宗師白雲年齒少脫體逞風流何嘗怕人笑五祖翻盡祖翁田捏成鐵酸餡信口打脫空雪曲巴音亂圓悟香篆銷金鴨午雞啼玉欄從來心裏事不許一人諳虎丘見見原非見太虛飛閃電睡虎忽翻身雄風生八面應菴坐斷金輪峰狐兔銷聲跡大哉甘露門古今歎莫及密菴提起破沙盆光明觸處生不煩除搕𢶍古路坦然平破菴倒拈七尺藤為人作撇脫堪笑刻舟人特地成途轍無準終日弄胡孫鼓破胡孫走從此恣眠餐伎倆空雙手雪嵒觸破精靈窟殿前一株柏不識歲寒心等閒看黛色高峰捉敗主人公故鄉歸信通泗州逢大聖不改舊行蹤中峰來索童男女度與竹篦子無情化有情笑殺自家底千嵒鵲噪豈知音鼠竊終難飽築碎嘗住磚至今償不了萬峰諸法從本來嘗自寂滅相勘破老南泉明珠呈掌上寶藏底事存玄要無心絶正偏萬峰接手句春雨落梅天東明心亦不是佛智亦不是道打破太虛空一時多靠倒海舟龜背刮霜毛兔頭截銀角片月落寒潭至今無摸索寶峰西天有外道東土無衲僧江山共雲月一一是師承天奇碌碌走天涯春風幾度花飽嘗途路苦猛省便還家無聞胡馬向風嘶心空及第時華山高突兀無路得攀躋笑巖千古獨馨香秖是一莖菜縮身柳巷中別有通人愛龍池爆破碧琉璃衝霄有路歸禹門風浪險霹靂是生機天童白棒據當門劃斷聖凡路春滿化龍池金鱗獲無數三峰折竹響成雷落梅寒似雪名高百世師心雄萬人傑靈嵒大冶烹佛祖正令行吳越聲價壓諸方人境兩俱奪達磨大師讚廓然無聖個是阿誰擬心即錯莫亂針錐齒不關風道法印匪從人得目如流電見支那儘好胡揮插腳梁皇殿上受他當面安排自覺風頭不順轉身冷面蒼崖骨髓一時齊潑撒更留隻履誑癡呆臨濟大師讚逢佛殺佛逢祖殺祖奮金剛劍撾塗毒鼓面門陡喪無位真人腳板踏折向上一路斬新別立乾坤依舊單行莽鹵餓鬼界裏放火奪漿地獄道中敲枷打鎖養成大隊瞎驢留下一隻睡虎至今遺害方來不免叫冤叫苦惡名流布滿塵寰誰信今朝殃及我雲門大師讚一拶腳便折一問頭便低到處隨波逐浪嘗時指東話西拋乾屎橛熏天觸地牽𨍏轢鑽透骨穿皮刮餿茶祭鬼謗露柱生兒忙叱僧堂反顧間將佛殿倒騎一味脫空捏怪全無展事投機待得香林果熟早見靈樹花飛休誇氣宇如王大滅祖欺宗定是伊雪竇明覺顯禪師讚面目儼然漫道往者不可問風規壁立孰云來者猶可追大韶陽門戶別北塔鉤錐魚龍盡陷佛祖平欺禪子訝中眉垂太湖三萬六千頃月在波心說向誰徑山大慧杲禪師讚開虛空口掉霹靂舌快便如風語語見血針砭膏肓掀翻途轍嫌圓悟忒殺禪多怪湛堂半邊鼻缺三尺竹篦攪叢林衲子至今無雪屈三峰漢月藏和尚讚乘願再來超群獨立起臨濟欲墜之綱宗得汾陽不傳之巴鼻攙旗奪鼓萬象心驚換卦抽爻森羅骨栗掃蕩者固是英雄建立者乃真豪傑遂使五燈寒焰復燦當時何啻大樹清陰重榮此日者哉靈巖退翁老和尚讚不用臨濟喝不行德山棒掃除從上葛藤蕩盡諸方伎倆歡喜時截南山之竹為筆莫寫其慈心惱怒時磨東海之波作墨難描其惡狀知他是聖是凡任汝為龍為象列下說法六成就杜撰長老未免眉攢演出臨機八要門過量英雄也須膽喪不居真際密施佛祖權衡不涉衆緣懸起人天榜樣道眼圓明底猶難睹其頂𩕳機心濃厚者豈易窺其背項不敢讚何敢毀不可親僅可望夫是之謂十坐大道場中興濟北宗底退翁老和尚董菴尼祇園禪師讚孤迥迥十方無壁峭巍巍四面無門拈弄一條白棒何妨到處稱尊截鐵斬釘乃宗師本分平高就下非識者疇論是亦所謂金粟之子天童之孫也耶天台尼自覺禪師讚華頂風高石橋水冷師住其間足不越閫垂三十年大作佛事月燭慧燈星排道樹不學小乘法有愛憎街頭示滅遍界分身我未識師夙聞令範曷志瞻依聊為述讚妙湛尼寶持總禪師讚不居煩惱窟不坐解脫坑外不求諸聖內不負己靈似香象渡河能超兔跡如金翅擘海直取龍吞精嚴自肯勇敢誰倫佩靈山正印總無著孤軍掃蕩煙雲清宇宙木人同享太平春伏獅尼義恭珂禪師讚靈利直是靈利撇脫果然撇脫東山水上勘破諸佛出身生緣略同伏師室中點定衲僧正眼立地迥別鶯啼燕語迦葉不聞聞草長花繁世尊不說說嫌他窮伎倆細切嶺頭雲討甚閒工夫薄披潭底月別別從前知己反為讎此日憑誰表清絶寒山尼元明老師壽像讚一片寒山沉巨浸吾師隱處茆庵靜從來清亦畏人知方寸中潛修戒定其處已也安必慮危其與人也久而能敬是真無愧古人而可垂裕後進者也靈瑞尼宗遠老師壽像讚念佛念法信己信人圓修福慧等視冤親要觀音傾心鬥樣與摩耶交臂稱鄰識得無依佛母自然慧命長新自題白紙一幅黑筆幾叉亦非男亦非女貌從何得不是神不是鬼變個甚麼無語則口邊堆醭有見則眼裏添花閒笑灌溪多莽鹵錯呼臨濟作爺爺口快如風性急如火罔辨親疏那知人我鋒稜上用不停機電光中兆分其五休誇一棒成龍謾說三玄陷虎豈不聞玄沙有言兮大丈夫先天為心祖兔角杖挑明月龜毛繩繫清風不是神通妙用阿誰敢問渠儂白石磊磊青松落落勘破形骸深藏頭角笑他流水空忙聽彼浮雲自薄固知耕也餒在其中孰信回也不改其樂洞庭山高不露頂太湖水深不濕腳下載清風付與誰祖師心印齊拋卻覿面兩無言臨機一著先金針穿白月石火迸青天笑倒唯心佛掀翻得肉禪近來貧更甚有問只空拳
